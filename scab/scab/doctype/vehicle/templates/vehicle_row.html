<a href="/{{ doc.route | e }}" style="text-decoration: none; color: inherit; display: block">
	<div
		style="
			display: flex;
			align-items: center;
			padding: 15px;
			background: #e2effb;
			border-radius: 12px;
			border-left: 5px solid #2563eb;
			margin-bottom: 15px;
			cursor: pointer;
			transition: all 0.25s ease;
		"
		onmouseover="
			this.style.transform = 'translateY(-2px)';
			this.style.boxShadow = '0 6px 16px rgba(0,0,0,0.15)';
		"
		onmouseout="
			this.style.transform = 'translateY(0)';
			this.style.boxShadow = 'none';
		"
	>
		<img
			src="{{ doc.vehicle_image if doc.vehicle_image else 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpyCXDLgQBT2liK5INRotGjCzD4IPdDgNbzg&s' }}"
			alt="Vehicle"
			style="
				width: 110px;
				height: 110px;
				object-fit: cover;
				border-radius: 10px;
				margin-right: 15px;
				border: 1px solid #e5e7eb;
				background: #ffffff;
			"
		/>

		<div>
			<div style="font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 6px">
				{{ doc.make }} {{ doc.model }}
			</div>

			<div style="font-size: 14px; color: #6b7280">Manufacturing Year: {{ doc.year }}</div>

			{% if doc.vehicle_type %}
			<div style="font-size: 14px; color: #6b7280">Type: {{ doc.vehicle_type }}</div>
			{% endif %}
		</div>
	</div>
</a>
